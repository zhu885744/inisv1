<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 自适应移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朱某的生活印记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式 */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* 主标题样式 */
        .title {
            font-size: 32px;
            font-weight: 500;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* 鼠标悬浮效果 */
        .title:hover {
            color: #007bff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- 点击跳转链接 -->
    <div class="title" onclick="window.open('https://zhuxu.asia/', '_blank')">
        朱某的生活印记
    </div>
</body>
</html>
