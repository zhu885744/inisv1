<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 自适应移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温馨提示</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --success-hover: #059669;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --warning-color: #f59e0b;
            --warning-hover: #d97706;
            --info-color: #3b82f6;
            --info-hover: #2563eb;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --border-color: #d1d5db;
            --border-radius: 0.5rem;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        /* 容器样式 */
        .container {
            width: 100%;
            display: flex;
            justify-content: center;
        }
        
        /* 卡片样式 */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            width: 50%;
            max-width: 600px;
        }
        
        /* 标题样式 */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--text-primary);
        }
        
        h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        /* 提示框样式 */
        .alert {
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
        }
        
        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        
        /* 段落样式 */
        p {
            margin-bottom: 0.5rem;
        }
        
        /* 列表样式 */
        ul {
            list-style-type: disc;
            list-style-position: inside;
            color: var(--text-secondary);
        }
        
        li {
            margin-bottom: 0.25rem;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            font-weight: 500;
            transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out, border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-secondary {
            background-color: #e5e7eb;
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background-color: #d1d5db;
        }
        
        /* 间距样式 */
        .mt-6 {
            margin-top: 1.5rem;
        }
        
        .space-y-4 {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .flex-col {
            display: flex;
            flex-direction: column;
        }
        
        .space-y-2 {
            gap: 0.5rem;
        }
        
        .flex {
            display: flex;
        }
        
        .justify-center {
            justify-content: center;
        }
        
        .space-x-4 {
            gap: 1rem;
        }
        
        .text-lg {
            font-size: 1.125rem;
        }
        
        .font-medium {
            font-weight: 500;
        }
        
        .text-center {
            text-align: center;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .card {
                width: 90%;
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.25rem;
            }
            
            h3 {
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .card {
                width: 100%;
                padding: 0.75rem;
            }
            
            .flex {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎉 系统已安装 🎉</h1>
            
            <div class="alert alert-success text-center">
                <p class="text-lg font-medium">系统已经成功安装！</p>
            </div>
            
            <div class="mt-6 space-y-4">
                <div class="flex-col space-y-2">
                    <h3>温馨提示：</h3>
                    <ul>
                        <li>由于本程序默认不提供后台管理面板，需要您手动部署或自托管带有后台管理面板的主题到服务器上。</li>
                        <li>初次使用需要您修改默认管理员账号密码为您自己的账号密码。</li>
                        <li>本程序默认提供了一套免费主题，需要您自行部署到服务器上。</li>
                        <li>您可以在本页面下方GitHub仓库中找到免费主题。</li>
                    </ul>
                </div>
                
                <div class="flex justify-center space-x-4">
                    <a href="https://github.com/zhu885744/inisv1" class="btn btn-secondary">后端 GitHub 仓库</a>
                    <a href="https://github.com/zhu885744/xiao-inisv1-vue" class="btn btn-secondary">前端主题 GitHub 仓库</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
